<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rhino-os evals</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #0a0a0a; color: #e0e0e0; padding: 24px; }
  h1 { font-size: 14px; color: #666; margin-bottom: 24px; letter-spacing: 2px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .card { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 20px; }
  .card-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .card-value { font-size: 32px; font-weight: bold; }
  .card-sub { font-size: 11px; color: #555; margin-top: 4px; }
  .green { color: #4ade80; }
  .yellow { color: #fbbf24; }
  .red { color: #f87171; }
  .dim { color: #555; }
  .section { margin-bottom: 32px; }
  .section-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; border-bottom: 1px solid #222; padding-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; text-align: left; padding: 8px 12px; border-bottom: 1px solid #222; }
  td { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
  tr:hover { background: #1a1a1a; }
  .bar-container { display: flex; align-items: center; gap: 8px; }
  .bar { height: 6px; border-radius: 3px; background: #222; flex: 1; max-width: 100px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .bar-fill.high { background: #4ade80; }
  .bar-fill.mid { background: #fbbf24; }
  .bar-fill.low { background: #f87171; }
  .verdict-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
  .verdict-SHIP { background: #052e16; color: #4ade80; border: 1px solid #166534; }
  .verdict-FIXES { background: #422006; color: #fbbf24; border: 1px solid #854d0e; }
  .verdict-BLOCKED { background: #350a0a; color: #f87171; border: 1px solid #991b1b; }
  .chart { height: 120px; display: flex; align-items: flex-end; gap: 2px; margin-top: 8px; }
  .chart-bar { flex: 1; min-width: 8px; border-radius: 2px 2px 0 0; transition: height 0.3s; position: relative; cursor: pointer; }
  .chart-bar:hover::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; white-space: nowrap; }
  .gaps-list { list-style: none; }
  .gaps-list li { padding: 8px 0; border-bottom: 1px solid #1a1a1a; font-size: 13px; display: flex; justify-content: space-between; }
  .gap-count { color: #555; font-size: 12px; }
  .empty { text-align: center; padding: 48px; color: #444; font-size: 13px; }
  .refresh { position: fixed; top: 24px; right: 24px; font-size: 11px; color: #444; }
</style>
</head>
<body>

<h1>rhino-os &mdash; eval dashboard</h1>
<div class="refresh" id="refresh">auto-refresh: 10s</div>

<div id="app">
  <div class="empty">Loading...</div>
</div>

<script>
const API = '';

async function fetchData() {
  try {
    const res = await fetch(`${API}/evals/summary`);
    return await res.json();
  } catch {
    return null;
  }
}

function barClass(score) {
  if (score >= 0.7) return 'high';
  if (score >= 0.5) return 'mid';
  return 'low';
}

function verdictClass(v) {
  if (v === 'SHIP') return 'verdict-SHIP';
  if (v === 'SHIP WITH FIXES' || v === 'SHIP_WITH_FIXES') return 'verdict-FIXES';
  return 'verdict-BLOCKED';
}

function verdictLabel(v) {
  if (v === 'SHIP_WITH_FIXES') return 'SHIP WITH FIXES';
  return v;
}

function render(data) {
  if (!data || data.total === 0) {
    document.getElementById('app').innerHTML = `
      <div class="empty">
        No eval data yet.<br><br>
        Run builder plan mode to generate eval specs,<br>
        then /eval after building to populate this dashboard.
      </div>`;
    return;
  }

  const ceilingDisplay = data.ceilingAvg != null ? data.ceilingAvg.toFixed(2) : '—';
  const perspDisplay = data.perspectivesAvg != null ? data.perspectivesAvg.toFixed(2) : '—';
  const ceilingColor = data.ceilingAvg >= 0.7 ? 'green' : data.ceilingAvg >= 0.5 ? 'yellow' : 'red';
  const perspColor = data.perspectivesAvg >= 0.7 ? 'green' : data.perspectivesAvg >= 0.5 ? 'yellow' : 'red';

  // Ceiling trend chart
  let chartHTML = '';
  if (data.history.length > 1) {
    const maxScore = 1.0;
    chartHTML = data.history.map((e, i) => {
      const score = typeof e.ceiling === 'number' ? e.ceiling : 0;
      const h = Math.max(4, (score / maxScore) * 120);
      const cls = barClass(score);
      return `<div class="chart-bar bar-fill ${cls}" style="height:${h}px" data-tip="${e.feature || 'eval'}: ${score.toFixed(2)}"></div>`;
    }).join('');
  }

  // History table
  const rows = [...data.history].reverse().map(e => {
    const ceiling = typeof e.ceiling === 'number' ? e.ceiling.toFixed(2) : '—';
    const persp = typeof e.perspectives === 'number' ? e.perspectives.toFixed(2) : '—';
    const ceilPct = typeof e.ceiling === 'number' ? Math.round(e.ceiling * 100) : 0;
    const cls = barClass(e.ceiling || 0);
    return `<tr>
      <td>${e.date || '—'}</td>
      <td>${e.feature || '—'}</td>
      <td><span class="verdict-badge ${verdictClass(e.verdict)}">${verdictLabel(e.verdict || '—')}</span></td>
      <td><div class="bar-container"><div class="bar"><div class="bar-fill ${cls}" style="width:${ceilPct}%"></div></div><span class="dim">${ceiling}</span></div></td>
      <td class="dim">${persp}</td>
      <td class="dim">${e.functional || '—'}</td>
    </tr>`;
  }).join('');

  // Gaps list
  const gapsHTML = data.topGaps.length > 0
    ? data.topGaps.map(g => `<li>${g.gap} <span class="gap-count">${g.count}x</span></li>`).join('')
    : '<li class="dim">No ceiling gaps recorded yet</li>';

  document.getElementById('app').innerHTML = `
    <div class="grid">
      <div class="card">
        <div class="card-label">Total Evals</div>
        <div class="card-value">${data.total}</div>
      </div>
      <div class="card">
        <div class="card-label">Ship Rate</div>
        <div class="card-value ${data.shipRate >= 70 ? 'green' : data.shipRate >= 50 ? 'yellow' : 'red'}">${data.shipRate}%</div>
        <div class="card-sub">${data.ship} ship · ${data.fixes} fixes · ${data.blocked} blocked</div>
      </div>
      <div class="card">
        <div class="card-label">Ceiling Avg</div>
        <div class="card-value ${ceilingColor}">${ceilingDisplay}</div>
        <div class="card-sub">threshold: 0.6 · target: 0.7</div>
      </div>
      <div class="card">
        <div class="card-label">Perspectives Avg</div>
        <div class="card-value ${perspColor}">${perspDisplay}</div>
        <div class="card-sub">threshold: 0.6</div>
      </div>
    </div>

    ${chartHTML ? `
    <div class="section">
      <div class="section-title">Ceiling Score Trend</div>
      <div class="card">
        <div class="chart">${chartHTML}</div>
      </div>
    </div>` : ''}

    <div class="section">
      <div class="section-title">Ceiling Gaps (recurring AI judgment failures)</div>
      <div class="card">
        <ul class="gaps-list">${gapsHTML}</ul>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Recent Evals</div>
      <div class="card" style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Date</th><th>Feature</th><th>Verdict</th><th>Ceiling</th><th>Persp.</th><th>Functional</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

async function update() {
  const data = await fetchData();
  if (data) render(data);
}

update();
setInterval(update, 10000);
</script>
</body>
</html>
