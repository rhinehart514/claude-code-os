# beliefs.yml — Your product's soul, enforced mechanically
#
# Each belief is a hypothesis about what makes your product great.
# Beliefs are tested by eval.sh. Only types eval.sh supports are valid:
#   - content_check with forbidden: [...] — scans src/ for forbidden words
#   - route_graph — counts Next.js routes
#   - file_check — verifies file existence and content patterns
#   - dom_check — requires dev server (skipped in CLI eval, run via taste)
#   - playwright_task — requires dev server + Playwright (skipped in CLI eval)
#
# Severity: block (exits non-zero) | warn (flags but continues)
#
# Lifecycle:
#   Planted → Failing → Passing → Locked (3+ sessions validated)

beliefs:

  # --- Value tier (does the product deliver?) ---

  - id: value-hypothesis-exists
    belief: "The product must define what value it delivers — no hypothesis, no direction"
    type: file_check
    check: "config/rhino.yml contains 'value:' section"
    severity: block

  - id: knowledge-model-exists
    belief: "The learning model must exist — without it the system can't compound"
    type: file_check
    check: "~/.claude/knowledge/experiment-learnings.md exists and has content"
    severity: block

  # --- Craft tier (is the experience well-made?) ---

  - id: no-jargon
    belief: "No user needs a glossary to use rhino-os"
    type: content_check
    forbidden: ["utilize", "leverage", "synergy", "paradigm", "ecosystem", "holistic"]
    severity: warn

  # --- Health tier (is the code clean?) ---

  - id: no-dead-skills
    belief: "Every skill file must handle failure — unrecoverable skills break the loop"
    type: file_check
    check: "all .claude/commands/*.md contain 'If something breaks'"
    severity: warn

  - id: hooks-resolve
    belief: "All hook symlinks must point to real files"
    type: file_check
    check: "all symlinks in ~/.claude/hooks/ resolve"
    severity: warn

  - id: mind-files-loaded
    belief: "Mind files must be globally accessible — they're the system's values"
    type: file_check
    check: "~/.claude/rules/ has symlinks to mind/identity.md, mind/thinking.md, mind/standards.md"
    severity: block

