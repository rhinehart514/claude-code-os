# Healthy — 8/8 pass
beliefs:

  - id: config-exists
    belief: "rhino.yml exists"
    type: file_check
    path: "config/rhino.yml"
    feature: scoring
    severity: warn

  - id: has-hypothesis
    belief: "Value hypothesis defined"
    type: file_check
    path: "config/rhino.yml"
    contains: "hypothesis:"
    feature: scoring
    severity: warn

  - id: has-signals
    belief: "Value signals defined"
    type: file_check
    path: "config/rhino.yml"
    contains: "signals:"
    feature: scoring
    severity: warn

  - id: has-user
    belief: "Target user defined"
    type: file_check
    path: "config/rhino.yml"
    contains: "user:"
    feature: scoring
    severity: warn

  - id: has-bin
    belief: "bin/ has scripts"
    type: file_check
    path: "bin/run.sh"
    feature: cli
    severity: warn

  - id: has-tests
    belief: "Tests exist"
    type: file_check
    path: "tests/main.test.sh"
    feature: cli
    severity: warn

  - id: has-readme
    belief: "README exists"
    type: file_check
    path: "README.md"
    feature: docs
    severity: warn

  - id: has-license
    belief: "LICENSE exists"
    type: file_check
    path: "LICENSE"
    feature: docs
    severity: warn
