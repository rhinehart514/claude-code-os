# Mediocre — 3/6 pass, 3/6 fail
beliefs:

  - id: config-exists
    belief: "rhino.yml exists"
    type: file_check
    path: "config/rhino.yml"
    feature: scoring
    severity: warn

  - id: has-hypothesis
    belief: "Value hypothesis defined"
    type: file_check
    path: "config/rhino.yml"
    contains: "hypothesis:"
    feature: scoring
    severity: warn

  - id: has-bin
    belief: "bin/ directory exists"
    type: file_check
    path: "bin/run.sh"
    feature: cli
    severity: warn

  # These 3 will FAIL (files don't exist)
  - id: has-tests
    belief: "Test directory exists"
    type: file_check
    path: "tests/main.test.sh"
    feature: cli
    severity: warn

  - id: has-readme
    belief: "README exists"
    type: file_check
    path: "README.md"
    feature: docs
    severity: warn

  - id: has-changelog
    belief: "CHANGELOG exists"
    type: file_check
    path: "CHANGELOG.md"
    feature: docs
    severity: warn
