# strategy.yml — Product strategy as structured data
# /strategy writes this. /plan reads this for bottleneck + stage.
# Replaces product-model.md and learning-agenda.md with typed fields.

meta:
  updated: 2026-03-15
  stage: one
  stage_definition: "Core loop works for one person (Laney on HIVE). Partially validated externally (commander.js)."

bottleneck:
  name: first-loop
  description: "The gap between 'project is set up' and 'I ran /go and my project got better'"
  evidence: "commander.js validated init→score (80/100, 6 features, 8/10 assertions). Full human loop (/plan → /go → return) untested."
  blocked_by: "No human external user has completed the full loop"

loop:
  install: 4
  install_notes: "git clone + install.sh verified working. Plugin mode guards added. npm deps undocumented for plugin users."
  setup: 3
  setup_notes: "Commands work, cross-recommendations guide next step. No guided onboarding flow yet."
  first_loop: 2
  first_loop_notes: "commander.js: init→score path works (80/100). /go loop untested on external project."
  value: 1
  value_notes: "Score works immediately. Taste requires Playwright + dev server."
  return: 1
  return_notes: "Session context hook exists. Never tested externally."

unknowns:
  - id: external-project
    question: "Does the full loop work on a non-HIVE project?"
    first_experiment: "Run /strategy → /plan → /go on a small existing project"
    graduation: "One non-HIVE project completes with score delta > 0"
    priority: resolved
    result: "commander.js: init→score validated 2026-03-15. 80/100 on first init (6 features, 8/10 assertions). Full /go loop not yet tested."

  - id: loop-compounds
    question: "Does the loop actually compound across sessions?"
    first_experiment: "Run 3 consecutive /go cycles, track prediction citations"
    graduation: ">30% of predictions cite experiment-learnings.md entries"
    priority: high

  - id: new-user-friction
    question: "What breaks first for new users?"
    first_experiment: "Fresh install walkthrough on a clean machine"
    graduation: "New user completes install → setup → first /plan without help"
    priority: medium

graduation:
  from: one
  to: some
  criteria:
    - "10+ predictions logged ✓"
    - "3+ experiment learnings for rhino-os itself ✓"
    - "2/3 unknowns resolved — 1/3 (external-project resolved, 2 remaining)"
    - "FirstLoop score >= 2/3 — currently 2/5"
